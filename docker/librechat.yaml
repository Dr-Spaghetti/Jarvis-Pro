# LibreChat v0.8.5 configuration for Jarvis-Pro
# Reference: https://www.librechat.ai/docs/configuration/librechat_yaml
#
# SECURITY NOTE:
#   CVE-2026-22252 (GHSA-cxhj-j78r-p88f) was fixed in v0.8.4+.
#   Pin the Docker image to a numbered tag and update monthly.
#   MCP stdio servers run inside the container as the node process —
#   never add an MCP server URL you don't control.

version: 1.3.9
cache: true

# ── Interface ─────────────────────────────────────────────────────────────────
interface:
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  prompts: true
  bookmarks: true
  multiConvo: true
  agents: true

# ── Rate limiting ─────────────────────────────────────────────────────────────
rateLimits:
  fileUploads:
    ipMax: 100
    ipWindowInMinutes: 60
    userMax: 50
    userWindowInMinutes: 60

# ── MCP Servers ───────────────────────────────────────────────────────────────
# All three transports are demonstrated here.
# stdio servers run via npx/uvx inside the LibreChat container.
# streamable-http servers run outside (on your host) and are reached via
# host.docker.internal which resolves to the Docker host on Windows/Mac.

mcpServers:
  # Filesystem access — reads /app/uploads (bind-mounted from ../clients + uploads)
  filesystem:
    type: stdio
    command: npx
    args:
      - "-y"
      - "@modelcontextprotocol/server-filesystem"
      - "/app/uploads"
    timeout: 30000

  # Web search (requires TAVILY_API_KEY in .env)
  tavily:
    type: stdio
    command: npx
    args:
      - "-y"
      - "tavily-mcp"
    env:
      TAVILY_API_KEY: "${TAVILY_API_KEY}"
    timeout: 30000

  # Local Falcon — use the hosted Streamable HTTP endpoint to avoid
  # Windows path issues with the stdio version
  localfalcon:
    type: streamable-http
    url: "https://mcp.localfalcon.com/sse?local_falcon_api_key=${LOCALFALCON_API_KEY}"
    timeout: 60000

  # Jarvis-Pro tools — Streamable HTTP server (run: python mcp_http_server.py)
  # Exposes: run_skill, research, list_clients, get_client, skill_metrics
  jarvis-tools:
    type: streamable-http
    url: "http://host.docker.internal:8765/mcp"
    timeout: 60000

mcpSettings:
  allowedAddresses:
    - "host.docker.internal:8765"   # Jarvis MCP HTTP server
    - "host.docker.internal:8000"   # Jarvis OpenAI-compatible API (serve.py)
    - "mcp.localfalcon.com"

# ── Endpoints ─────────────────────────────────────────────────────────────────
endpoints:
  anthropic:
    apiKey: "${ANTHROPIC_API_KEY}"
    streamRate: 35
    titleModel: "claude-haiku-4-5-20251001"
    titleConvo: true
    summarize: true
    summaryModel: "claude-haiku-4-5-20251001"
    models:
      default:
        - "claude-sonnet-4-6"
        - "claude-opus-4-7"
        - "claude-haiku-4-5-20251001"
      fetch: false

  # Jarvis skills exposed as "models" via serve.py
  # Run: python serve.py (listens on port 8000)
  custom:
    - name: "Jarvis Skills"
      apiKey: "jarvis"
      baseURL: "http://host.docker.internal:8000/v1"
      models:
        default:
          - "jarvis-citation-audit"
          - "jarvis-falcon-report"
          - "jarvis-gbp-monitor"
          - "jarvis-keyword-hygiene"
        fetch: true
      titleConvo: true
      titleModel: "jarvis-citation-audit"

# ── File handling ─────────────────────────────────────────────────────────────
fileConfig:
  endpoints:
    anthropic:
      disabled: false
      fileLimit: 10
      fileSizeLimit: 20
      totalSizeLimit: 100
      supportedMimeTypes:
        - "image/.*"
        - "application/pdf"
        - "text/.*"
        - "application/json"
        - "application/vnd.openxmlformats-officedocument.*"
