version: "3.8"

# Jarvis-Pro — LibreChat v0.8.5 + supporting services
#
# Usage:
#   cp .env.example .env   (fill JWT_SECRET, CREDS_KEY, CREDS_IV, ANTHROPIC_API_KEY)
#   docker compose up -d
#   open http://localhost:3080
#
# SECURITY: Pinned to v0.8.5 which contains CVE-2026-22252 fixes.
# Update monthly; always pin to a numbered tag, never use :latest.

services:
  # ── LibreChat API ─────────────────────────────────────────────────────────
  librechat:
    image: registry.librechat.ai/danny-avila/librechat:v0.8.5
    container_name: jarvis-librechat
    restart: unless-stopped
    ports:
      - "3080:3080"
    depends_on:
      - mongodb
      - meilisearch
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HOST=0.0.0.0
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/LibreChat
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-masterKey}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - CREDS_KEY=${CREDS_KEY}
      - CREDS_IV=${CREDS_IV}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LOCALFALCON_API_KEY=${LOCALFALCON_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - ALLOW_REGISTRATION=${ALLOW_REGISTRATION:-false}
      - ALLOW_SOCIAL_LOGIN=false
      - RAG_API_URL=http://rag_api:8000
    volumes:
      - ./librechat.yaml:/app/librechat.yaml:ro
      - librechat_images:/app/client/public/images
      - librechat_logs:/app/api/logs
      # Bind-mount the clients.json and uploads so the filesystem MCP can reach them
      - ../clients:/app/uploads/clients:ro
      - librechat_uploads:/app/uploads

  # ── MongoDB ────────────────────────────────────────────────────────────────
  # Chat history, user data, agent configurations
  # Pin to 7.x; if running on pre-Haswell i5 pin to mongo:4.4.18 instead
  mongodb:
    image: mongo:7
    container_name: jarvis-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    command: mongod --noauth

  # ── Meilisearch ────────────────────────────────────────────────────────────
  # Full-text conversation search with typo tolerance
  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: jarvis-meilisearch
    restart: unless-stopped
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-masterKey}
      - MEILI_ENV=production
    volumes:
      - meilisearch_data:/meili_data

  # ── pgvector ──────────────────────────────────────────────────────────────
  # Vector store for RAG embeddings
  vectordb:
    image: ankane/pgvector:latest
    container_name: jarvis-vectordb
    restart: unless-stopped
    environment:
      - POSTGRES_DB=mydatabase
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
    volumes:
      - pgvector_data:/var/lib/postgresql/data

  # ── RAG API ───────────────────────────────────────────────────────────────
  # Document ingestion and retrieval pipeline
  rag_api:
    image: ghcr.io/danny-avila/librechat-rag-api-dev-lite:latest
    container_name: jarvis-rag-api
    restart: unless-stopped
    depends_on:
      - vectordb
    environment:
      - DB_HOST=vectordb
      - DB_PORT=5432
      - DB_NAME=mydatabase
      - DB_USER=myuser
      - DB_PASS=mypassword

volumes:
  mongodb_data:
  meilisearch_data:
  pgvector_data:
  librechat_images:
  librechat_uploads:
  librechat_logs:
