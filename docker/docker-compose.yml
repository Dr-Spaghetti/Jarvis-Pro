services:
  # ── Jarvis Web UI ──────────────────────────────────────────────────────────
  # The native Jarvis dashboard — zero extra config, runs on Python.
  # Open http://localhost:7860 after `docker compose up -d`
  jarvis:
    build:
      context: ..
      dockerfile: docker/Dockerfile.jarvis
    container_name: jarvis-ui
    restart: unless-stopped
    ports:
      - "7860:7860"   # Web dashboard
      - "8000:8000"   # OpenAI-compatible API
      - "8765:8765"   # MCP Streamable HTTP
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - LOCAL_FALCON_API_KEY=${LOCAL_FALCON_API_KEY:-}
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-claude-sonnet-4-6}
      - RESEARCH_MODEL=${RESEARCH_MODEL:-claude-opus-4-7}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ../clients:/app/clients          # persist client registry
      - jarvis_jarvis_data:/app/.jarvis   # persist metrics + cache

  # ── LibreChat ──────────────────────────────────────────────────────────────
