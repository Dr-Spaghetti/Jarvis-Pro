services:
  # ── Open WebUI ─────────────────────────────────────────────────────────────
  # Primary interface — ChatGPT-quality UI with voice, Claude, and Jarvis tools.
  # Open http://localhost:3000 after `docker compose up -d`
  # First launch: create an admin account, then sign in.
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: jarvis-open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # ── Claude (required) ─────────────────────────────────────────────────
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

      # ── ElevenLabs TTS (optional — browser TTS used if not set) ───────────
      # Set AUDIO_TTS_ENGINE=elevenlabs in your .env to enable
      - AUDIO_TTS_ENGINE=${AUDIO_TTS_ENGINE:-}
      - AUDIO_TTS_API_KEY=${ELEVENLABS_API_KEY:-}
      - AUDIO_TTS_VOICE=${ELEVENLABS_VOICE_ID:-EXAVITQu4vr4xnSDxMaL}
      - AUDIO_TTS_MODEL=eleven_multilingual_v2

      # ── STT (browser Web Speech API — free, no key needed) ────────────────
      - AUDIO_STT_ENGINE=web

      # ── Security ──────────────────────────────────────────────────────────
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-jarvis-webui-secret-change-me}

      # ── Disable OpenAI errors if no key ───────────────────────────────────
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      - jarvis

  # ── Jarvis Backend ─────────────────────────────────────────────────────────
  # Provides the MCP tool server (SEO skills, research, client registry)
  # and an OpenAI-compatible API wrapper around Claude.
  # Open WebUI connects to these automatically once you add the Tool Server.
  jarvis:
    build:
      context: ..
      dockerfile: docker/Dockerfile.jarvis
    container_name: jarvis-backend
    restart: unless-stopped
    ports:
      - "7860:7860"   # Jarvis native dashboard (backup UI)
      - "8000:8000"   # OpenAI-compatible API
      - "8765:8765"   # MCP Streamable HTTP (add as Tool Server in Open WebUI)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - LOCAL_FALCON_API_KEY=${LOCAL_FALCON_API_KEY:-}
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-claude-sonnet-4-6}
      - RESEARCH_MODEL=${RESEARCH_MODEL:-claude-opus-4-7}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ../clients:/app/clients
      - jarvis_data:/app/.jarvis

volumes:
  open_webui_data:
  jarvis_data:
