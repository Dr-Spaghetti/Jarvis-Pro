services:
  # ── Open WebUI ─────────────────────────────────────────────────────────────
  # Primary interface — ChatGPT-quality UI with voice, Claude, and Jarvis tools.
  # Run: docker compose up -d   →   open http://localhost:3000
  # No login required (single-user mode). Everything auto-configured on first boot.
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: jarvis-open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # ── Claude (required) ─────────────────────────────────────────────────
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

      # ── Single-user mode — no login screen ────────────────────────────────
      # Change to true if you want account-based access control
      - WEBUI_AUTH=false

      # ── ElevenLabs TTS (optional — browser TTS used if not set) ───────────
      # Set AUDIO_TTS_ENGINE=elevenlabs in your .env to enable
      - AUDIO_TTS_ENGINE=${AUDIO_TTS_ENGINE:-}
      - AUDIO_TTS_API_KEY=${ELEVENLABS_API_KEY:-}
      - AUDIO_TTS_VOICE=${ELEVENLABS_VOICE_ID:-EXAVITQu4vr4xnSDxMaL}
      - AUDIO_TTS_MODEL=eleven_multilingual_v2

      # ── STT (browser Web Speech API — free, no key needed) ────────────────
      - AUDIO_STT_ENGINE=web

      # ── Pre-select Claude as default model ────────────────────────────────
      - DEFAULT_MODELS=${DEFAULT_MODEL:-claude-sonnet-4-6}

      # ── Security ──────────────────────────────────────────────────────────
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY:-jarvis-webui-secret-change-me}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}

      # ── Tell the setup script where Open WebUI lives ──────────────────────
      - WEBUI_ADMIN_EMAIL=${WEBUI_ADMIN_EMAIL:-admin@jarvis.local}
      - WEBUI_ADMIN_PASSWORD=${WEBUI_ADMIN_PASSWORD:-jarvis-admin-2026}
    volumes:
      - open_webui_data:/app/backend/data
    depends_on:
      - jarvis

  # ── Jarvis Backend ─────────────────────────────────────────────────────────
  # Provides MCP tools (SEO skills, research, client registry) + OpenAI-compatible API.
  # On first boot, setup_webui.py auto-registers itself as a Tool Server in Open WebUI.
  jarvis:
    build:
      context: ..
      dockerfile: docker/Dockerfile.jarvis
    container_name: jarvis-backend
    restart: unless-stopped
    ports:
      - "7860:7860"   # Jarvis native dashboard (fallback)
      - "8000:8000"   # OpenAI-compatible API
      - "8765:8765"   # MCP Streamable HTTP
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - LOCAL_FALCON_API_KEY=${LOCAL_FALCON_API_KEY:-}
      - BRAVE_SEARCH_API_KEY=${BRAVE_SEARCH_API_KEY:-}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-claude-sonnet-4-6}
      - RESEARCH_MODEL=${RESEARCH_MODEL:-claude-opus-4-7}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Setup script config
      - WEBUI_URL=http://open-webui:8080
      - MCP_SELF_URL=http://jarvis-backend:8765/mcp
      - WEBUI_ADMIN_EMAIL=${WEBUI_ADMIN_EMAIL:-admin@jarvis.local}
      - WEBUI_ADMIN_PASSWORD=${WEBUI_ADMIN_PASSWORD:-jarvis-admin-2026}
    volumes:
      - ../clients:/app/clients
      - jarvis_data:/app/.jarvis

volumes:
  open_webui_data:
  jarvis_data:
