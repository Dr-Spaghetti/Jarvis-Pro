<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jarvis-Pro</title>
  <style>
    :root {
      --bg: #0d0e14;
      --surface: #15161f;
      --surface2: #1c1d2b;
      --border: #2a2b3d;
      --accent: #6c8ef5;
      --accent2: #9d7ef5;
      --green: #4ade80;
      --red: #f87171;
      --yellow: #fbbf24;
      --text: #e2e4f0;
      --muted: #6b7280;
      --radius: 10px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top nav ─────────────────────────────────────────────────────────── */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      height: 56px;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    nav .logo {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
      margin-right: 16px;
    }
    nav .nav-links { display: flex; gap: 4px; flex: 1; }
    nav .nav-btn {
      background: none;
      border: none;
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.15s;
    }
    nav .nav-btn:hover, nav .nav-btn.active {
      background: var(--surface2);
      color: var(--text);
    }
    nav .nav-btn.active { color: var(--accent); }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      margin-left: auto;
    }
    .status-label { font-size: 12px; color: var(--muted); }

    /* ── Layout ──────────────────────────────────────────────────────────── */
    .layout { display: flex; flex: 1; overflow: hidden; }
    .sidebar {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 16px 0;
      overflow-y: auto;
    }
    .sidebar-section { padding: 0 16px 16px; }
    .sidebar-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 8px 0 6px;
    }
    .client-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.12s;
      font-size: 13px;
    }
    .client-chip:hover { background: var(--surface2); }
    .client-chip.selected { background: rgba(108,142,245,0.12); color: var(--accent); }
    .client-avatar {
      width: 28px; height: 28px;
      border-radius: 7px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }
    .client-meta { flex: 1; min-width: 0; }
    .client-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .client-loc { font-size: 11px; color: var(--muted); }

    /* ── Main content ────────────────────────────────────────────────────── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ── Tabs ────────────────────────────────────────────────────────────── */
    .tab-container { display: none; flex-direction: column; flex: 1; overflow: hidden; }
    .tab-container.active { display: flex; }

    /* ── Chat / skill run ────────────────────────────────────────────────── */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .message {
      max-width: 820px;
      width: 100%;
    }
    .message.user { align-self: flex-end; }
    .message.assistant { align-self: flex-start; }
    .bubble {
      padding: 14px 18px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user .bubble {
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 3px;
    }
    .message.assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 3px;
    }
    .message-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      padding: 0 4px;
    }
    .message.user .message-meta { text-align: right; }

    /* ── Skill pills ─────────────────────────────────────────────────────── */
    .skill-picker {
      display: flex;
      gap: 8px;
      padding: 12px 24px;
      border-top: 1px solid var(--border);
      overflow-x: auto;
      background: var(--surface);
    }
    .skill-pill {
      padding: 6px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      color: var(--text);
    }
    .skill-pill:hover, .skill-pill.selected {
      background: rgba(108,142,245,0.2);
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Input bar ───────────────────────────────────────────────────────── */
    .input-bar {
      padding: 16px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .input-wrap {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 14px;
      transition: border-color 0.15s;
    }
    .input-wrap:focus-within { border-color: var(--accent); }
    textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      resize: none;
      min-height: 20px;
      max-height: 120px;
      line-height: 1.5;
    }
    textarea::placeholder { color: var(--muted); }
    .send-btn {
      background: var(--accent);
      border: none;
      border-radius: 7px;
      color: white;
      padding: 8px 18px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .send-btn:hover { opacity: 0.88; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Typing indicator ────────────────────────────────────────────────── */
    .typing-indicator {
      display: none;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 3px;
      width: fit-content;
    }
    .typing-indicator.visible { display: flex; }
    .dot {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ── Research tab ────────────────────────────────────────────────────── */
    .research-layout {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .research-input-area {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .research-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    .research-row { display: flex; gap: 10px; }
    .research-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    .research-input:focus { border-color: var(--accent); }
    .btn-primary {
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: white;
      padding: 10px 20px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    .research-options { display: flex; gap: 16px; margin-top: 10px; align-items: center; }
    .opt-label { font-size: 13px; color: var(--muted); }
    select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 13px;
      outline: none;
    }
    .research-results {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }
    .result-topic {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--accent);
    }
    .result-body {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
    }

    /* ── Clients tab ─────────────────────────────────────────────────────── */
    .clients-grid {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      align-content: start;
    }
    .client-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .client-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .client-card-avatar {
      width: 40px; height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: white;
    }
    .client-card-name { font-weight: 600; font-size: 15px; }
    .client-card-type { font-size: 12px; color: var(--muted); }
    .client-field {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .client-field:last-child { border-bottom: none; }
    .field-label { color: var(--muted); }
    .field-value { font-weight: 500; text-align: right; max-width: 60%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .tag {
      display: inline-block;
      background: rgba(108,142,245,0.15);
      color: var(--accent);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 500;
      margin: 2px;
    }

    /* ── Metrics tab ─────────────────────────────────────────────────────── */
    .metrics-grid {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    .metrics-row {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
    }
    .metric-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .metric-value { font-size: 28px; font-weight: 700; margin: 6px 0 2px; }
    .metric-sub { font-size: 12px; color: var(--muted); }
    .metric-value.green { color: var(--green); }
    .metric-value.red { color: var(--red); }
    .metric-value.accent { color: var(--accent); }
    .skill-table { width: 100%; border-collapse: collapse; }
    .skill-table th {
      text-align: left;
      padding: 10px 14px;
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--border);
    }
    .skill-table td {
      padding: 12px 14px;
      font-size: 14px;
      border-bottom: 1px solid var(--border);
    }
    .skill-table tr:last-child td { border-bottom: none; }
    .status-badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-green { background: rgba(74,222,128,0.15); color: var(--green); }
    .badge-red { background: rgba(248,113,113,0.15); color: var(--red); }
    .badge-yellow { background: rgba(251,191,36,0.15); color: var(--yellow); }

    /* ── Toast ───────────────────────────────────────────────────────────── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 999;
    }
    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 18px;
      font-size: 13px;
      min-width: 240px;
      animation: slideIn 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toast.success { border-left: 3px solid var(--green); }
    .toast.error { border-left: 3px solid var(--red); }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to   { transform: translateX(0);   opacity: 1; }
    }

    /* ── Scrollbar ───────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    /* ── Spinner ─────────────────────────────────────────────────────────── */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ──────────────────────────────────────────────────────── */
    @media (max-width: 700px) {
      .sidebar { display: none; }
    }
  </style>
</head>
<body>

<nav>
  <span class="logo">Jarvis-Pro</span>
  <div class="nav-links">
    <button class="nav-btn active" onclick="switchTab('skills')">Skills</button>
    <button class="nav-btn" onclick="switchTab('research')">Research</button>
    <button class="nav-btn" onclick="switchTab('clients')">Clients</button>
    <button class="nav-btn" onclick="switchTab('metrics')">Metrics</button>
  </div>
  <span class="status-dot" id="status-dot"></span>
  <span class="status-label" id="status-label">loading…</span>
</nav>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Clients</div>
      <div id="client-list"></div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Quick Runs</div>
      <div id="quick-runs"></div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- SKILLS TAB -->
    <div class="tab-container active" id="tab-skills">
      <div class="skill-picker" id="skill-picker"></div>
      <div class="chat-area" id="chat-area">
        <div class="message assistant">
          <div class="bubble">Welcome to Jarvis-Pro. Select a skill above and clients on the left, then describe what you need — or just hit Run.</div>
        </div>
      </div>
      <div class="input-bar">
        <div class="input-wrap">
          <textarea id="chat-input" rows="1" placeholder="Additional instructions, or just press Run…"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"
            oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
        </div>
        <button class="send-btn" id="run-btn" onclick="sendMessage()">Run</button>
      </div>
    </div>

    <!-- RESEARCH TAB -->
    <div class="tab-container" id="tab-research">
      <div class="research-layout">
        <div class="research-input-area">
          <div class="research-title">Research Harness</div>
          <div class="research-row">
            <input class="research-input" id="research-query" placeholder="e.g. How does NAP inconsistency affect local pack rankings?"
              onkeydown="if(event.key==='Enter')runResearch()"/>
            <button class="btn-primary" id="research-btn" onclick="runResearch()">Research</button>
          </div>
          <div class="research-options">
            <span class="opt-label">Depth:</span>
            <select id="research-depth">
              <option value="1">1 — Quick</option>
              <option value="2" selected>2 — Standard</option>
              <option value="3">3 — Deep</option>
            </select>
            <span class="opt-label">Client context:</span>
            <select id="research-client">
              <option value="">None</option>
            </select>
          </div>
        </div>
        <div class="research-results" id="research-results">
          <div style="color:var(--muted);font-size:14px;padding:20px 0;">Previous research results will appear here.</div>
        </div>
      </div>
    </div>

    <!-- CLIENTS TAB -->
    <div class="tab-container" id="tab-clients">
      <div class="clients-grid" id="clients-grid"></div>
    </div>

    <!-- METRICS TAB -->
    <div class="tab-container" id="tab-metrics">
      <div class="metrics-grid" id="metrics-grid">
        <div style="color:var(--muted);font-size:14px;">Loading metrics…</div>
      </div>
    </div>

  </main>
</div>

<div class="toast-container" id="toasts"></div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let selectedSkill = null;
let selectedClients = new Set(['all']);
let clients = [];
let skills = [];
let currentTab = 'skills';

// ── Init ───────────────────────────────────────────────────────────────────
async function init() {
  await Promise.all([loadClients(), loadSkills(), checkHealth()]);
  loadMetrics();
}

async function checkHealth() {
  try {
    const r = await fetch('/api/health');
    const d = await r.json();
    document.getElementById('status-dot').style.background =
      d.status === 'ok' ? 'var(--green)' : 'var(--red)';
    document.getElementById('status-label').textContent =
      d.status === 'ok' ? `${d.clients} clients · ${d.skills} skills` : 'error';
  } catch {
    document.getElementById('status-dot').style.background = 'var(--red)';
    document.getElementById('status-label').textContent = 'offline';
  }
}

async function loadClients() {
  const r = await fetch('/api/clients');
  clients = await r.json();
  renderSidebarClients();
  renderClientsGrid();
  populateResearchClientSelect();
}

async function loadSkills() {
  const r = await fetch('/api/skills');
  skills = await r.json();
  renderSkillPicker();
  renderQuickRuns();
  if (skills.length) selectedSkill = skills[0].name;
}

// ── Navigation ─────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-container').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach((btn, i) => {
    btn.classList.toggle('active', btn.textContent.toLowerCase() === tab ||
      (tab === 'skills' && btn.textContent === 'Skills'));
  });
  if (tab === 'metrics') loadMetrics();
}

// ── Sidebar ────────────────────────────────────────────────────────────────
function renderSidebarClients() {
  const el = document.getElementById('client-list');
  el.innerHTML = '';

  // "All clients" chip
  const allChip = makeClientChip('all', 'All', 'All active clients', true);
  el.appendChild(allChip);

  clients.forEach(c => {
    const initials = c.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const chip = makeClientChip(c.id, c.name, `${c.city}, ${c.state}`, false, initials);
    el.appendChild(chip);
  });
}

function makeClientChip(id, name, sub, isAll, initials) {
  const div = document.createElement('div');
  div.className = 'client-chip' + (isAll ? ' selected' : '');
  div.dataset.id = id;
  div.innerHTML = `
    <div class="client-avatar" style="${isAll ? 'background:linear-gradient(135deg,#4ade80,#22d3ee)' : ''}">
      ${isAll ? '★' : (initials||'?')}
    </div>
    <div class="client-meta">
      <div class="client-name">${name}</div>
      <div class="client-loc">${sub}</div>
    </div>`;
  div.onclick = () => toggleClient(id, div);
  return div;
}

function toggleClient(id, el) {
  if (id === 'all') {
    selectedClients = new Set(['all']);
    document.querySelectorAll('.client-chip').forEach(c => {
      c.classList.toggle('selected', c.dataset.id === 'all');
    });
  } else {
    selectedClients.delete('all');
    document.querySelector('[data-id="all"]').classList.remove('selected');
    if (selectedClients.has(id)) {
      selectedClients.delete(id);
      el.classList.remove('selected');
      if (!selectedClients.size) {
        selectedClients.add('all');
        document.querySelector('[data-id="all"]').classList.add('selected');
      }
    } else {
      selectedClients.add(id);
      el.classList.add('selected');
    }
  }
}

function renderQuickRuns() {
  const el = document.getElementById('quick-runs');
  const labels = {'citation-audit':'📋 Citation Audit','falcon-report':'🦅 Falcon Report','gbp-monitor':'📍 GBP Monitor','keyword-hygiene':'🔑 Keywords'};
  el.innerHTML = '';
  skills.forEach(s => {
    const div = document.createElement('div');
    div.className = 'client-chip';
    div.innerHTML = `<span style="font-size:14px">${labels[s.name]||s.name}</span>`;
    div.onclick = () => {
      selectedSkill = s.name;
      document.querySelectorAll('.skill-pill').forEach(p => p.classList.toggle('selected', p.dataset.skill === s.name));
      switchTab('skills');
      sendMessage();
    };
    el.appendChild(div);
  });
}

// ── Skill picker ───────────────────────────────────────────────────────────
function renderSkillPicker() {
  const el = document.getElementById('skill-picker');
  el.innerHTML = '';
  skills.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'skill-pill' + (i===0?' selected':'');
    btn.dataset.skill = s.name;
    btn.textContent = s.name;
    btn.onclick = () => {
      selectedSkill = s.name;
      document.querySelectorAll('.skill-pill').forEach(p => p.classList.toggle('selected', p===btn));
    };
    el.appendChild(btn);
  });
}

// ── Chat / skill run ───────────────────────────────────────────────────────
async function sendMessage() {
  if (!selectedSkill) { toast('Select a skill first.', 'error'); return; }
  const input = document.getElementById('chat-input');
  const note = input.value.trim();
  const runBtn = document.getElementById('run-btn');

  const clientSpec = selectedClients.has('all') ? 'all' : [...selectedClients].join(',');
  const userText = `Run [${selectedSkill}] for: ${clientSpec}${note ? '\n'+note : ''}`;
  addMessage('user', userText);
  input.value = '';
  input.style.height = 'auto';
  runBtn.disabled = true;
  runBtn.innerHTML = '<div class="spinner"></div>';

  const typing = addTyping();

  try {
    const r = await fetch('/api/run-skill', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({skill: selectedSkill, clients: clientSpec, note})
    });
    const data = await r.json();
    typing.remove();
    if (data.results) {
      data.results.forEach(res => {
        const status = res.success ? '✅' : '❌';
        const header = `${status} ${res.client_name} · ${selectedSkill} · ${res.duration_s.toFixed(1)}s · exec:${res.execution_id}`;
        const body = res.success ? (res.output || '(no output)') : `Error: ${res.error}`;
        addMessage('assistant', header + '\n\n' + body, res.execution_id, res.success);
      });
    } else {
      addMessage('assistant', data.error || 'Unknown error');
    }
  } catch(e) {
    typing.remove();
    addMessage('assistant', 'Connection error: ' + e.message);
  }

  runBtn.disabled = false;
  runBtn.textContent = 'Run';
}

function addMessage(role, text, execId, success) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const time = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  let meta = `<div class="message-meta">${time}`;
  if (execId && success !== undefined) {
    meta += ` · <a href="#" onclick="openFeedback('${execId}',event)" style="color:var(--accent)">rate this</a>`;
  }
  meta += '</div>';
  div.innerHTML = `<div class="bubble">${escHtml(text)}</div>${meta}`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function addTyping() {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.innerHTML = '<div class="typing-indicator visible"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function openFeedback(execId, e) {
  e.preventDefault();
  const rating = prompt(`Rate execution ${execId} (1–5 stars):`);
  if (!rating) return;
  const r = parseInt(rating);
  if (r < 1 || r > 5) { toast('Rating must be 1-5', 'error'); return; }
  fetch('/api/feedback', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({execution_id: execId, rating: r})
  }).then(() => toast(`★${r}/5 saved`, 'success'));
}

// ── Research ───────────────────────────────────────────────────────────────
function populateResearchClientSelect() {
  const sel = document.getElementById('research-client');
  clients.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.name;
    sel.appendChild(opt);
  });
}

async function runResearch() {
  const query = document.getElementById('research-query').value.trim();
  if (!query) return;
  const depth = document.getElementById('research-depth').value;
  const clientId = document.getElementById('research-client').value;
  const btn = document.getElementById('research-btn');
  btn.disabled = true;
  btn.textContent = 'Researching…';

  const results = document.getElementById('research-results');
  const placeholder = document.createElement('div');
  placeholder.innerHTML = '<div class="result-card"><div style="color:var(--muted)">Running research harness… this takes 30–90 seconds.</div></div>';
  results.prepend(placeholder);

  try {
    const r = await fetch('/api/research', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({topic: query, depth: parseInt(depth), client_id: clientId||null})
    });
    const data = await r.json();
    placeholder.remove();
    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <div class="result-topic">${escHtml(query)}</div>
      <div class="result-body">${escHtml(data.summary || data.error || 'No result')}</div>
      <div style="font-size:12px;color:var(--muted);margin-top:12px">${data.sources||0} sources · depth ${depth}${data.cached?' · cached':''}</div>`;
    results.prepend(card);
  } catch(e) {
    placeholder.innerHTML = `<div class="result-card"><div style="color:var(--red)">Error: ${e.message}</div></div>`;
  }

  btn.disabled = false;
  btn.textContent = 'Research';
}

// ── Clients grid ───────────────────────────────────────────────────────────
function renderClientsGrid() {
  const el = document.getElementById('clients-grid');
  el.innerHTML = '';
  clients.forEach(c => {
    const initials = c.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const tags = (c.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
    const card = document.createElement('div');
    card.className = 'client-card';
    card.innerHTML = `
      <div class="client-card-header">
        <div class="client-card-avatar">${initials}</div>
        <div>
          <div class="client-card-name">${c.name}</div>
          <div class="client-card-type">${c.business_type||c.industry||''}</div>
        </div>
      </div>
      <div class="client-field"><span class="field-label">Location</span><span class="field-value">${c.city||'—'}, ${c.state||'—'}</span></div>
      <div class="client-field"><span class="field-label">Primary Keyword</span><span class="field-value">${c.primary_keyword||'—'}</span></div>
      <div class="client-field"><span class="field-label">Website</span><span class="field-value"><a href="${c.website||'#'}" target="_blank" style="color:var(--accent)">${c.website||'—'}</a></span></div>
      <div class="client-field"><span class="field-label">GBP Category</span><span class="field-value">${c.gbp?.primary_category||'—'}</span></div>
      <div class="client-field"><span class="field-label">Billing</span><span class="field-value">${c.billing?.plan||'—'}${c.billing?.monthly_usd ? ' · $'+c.billing.monthly_usd+'/mo':''}</span></div>
      ${tags ? `<div style="margin-top:10px">${tags}</div>` : ''}`;
    el.appendChild(card);
  });
}

// ── Metrics ────────────────────────────────────────────────────────────────
async function loadMetrics() {
  try {
    const r = await fetch('/api/metrics');
    const data = await r.json();
    renderMetrics(data);
  } catch(e) {
    document.getElementById('metrics-grid').innerHTML = `<div style="color:var(--red)">Could not load metrics: ${e.message}</div>`;
  }
}

function renderMetrics(data) {
  const el = document.getElementById('metrics-grid');
  const totalRuns = data.skills.reduce((s,x)=>s+x.total_executions,0);
  const totalOk = data.skills.reduce((s,x)=>s+(x.success_rate*x.total_executions/100|0),0);
  const avgDur = data.skills.filter(x=>x.avg_duration_s).reduce((s,x,_,a)=>s+x.avg_duration_s/a.length,0);

  el.innerHTML = `
    <div class="metrics-row">
      <div class="metric-card">
        <div class="metric-label">Total Runs</div>
        <div class="metric-value accent">${totalRuns}</div>
        <div class="metric-sub">across all skills</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Successes</div>
        <div class="metric-value green">${totalOk}</div>
        <div class="metric-sub">${totalRuns ? Math.round(totalOk/totalRuns*100) : 0}% success rate</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Avg Duration</div>
        <div class="metric-value accent">${avgDur.toFixed(1)}s</div>
        <div class="metric-sub">per skill execution</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Skills</div>
        <div class="metric-value accent">${data.skills.length}</div>
        <div class="metric-sub">${data.skills.filter(x=>x.status==='GREEN').length} healthy</div>
      </div>
    </div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
      <table class="skill-table">
        <thead>
          <tr>
            <th>Skill</th>
            <th>Runs</th>
            <th>Success Rate</th>
            <th>Avg Duration</th>
            <th>Avg Rating</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          ${data.skills.map(s=>`
            <tr>
              <td><strong>${s.skill}</strong></td>
              <td>${s.total_executions}</td>
              <td>${s.success_rate ? s.success_rate.toFixed(0)+'%' : '—'}</td>
              <td>${s.avg_duration_s ? s.avg_duration_s.toFixed(1)+'s' : '—'}</td>
              <td>${s.avg_user_rating ? '★'+s.avg_user_rating.toFixed(1) : '—'}</td>
              <td><span class="status-badge ${s.status==='GREEN'?'badge-green':s.status==='RED'?'badge-red':'badge-yellow'}">${s.status}</span></td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

// ── Utilities ──────────────────────────────────────────────────────────────
function escHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toast(msg, type='success') {
  const c = document.getElementById('toasts');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = type === 'success' ? '✓ '+msg : '✗ '+msg;
  c.appendChild(el);
  setTimeout(()=>el.remove(), 3500);
}

// ── Boot ───────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
